services:
  # 1. FastAPI Backend Web Service
  - type: web
    name: support-crm-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    rootDir: crm-backend
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///support_crm.db
      - key: PYTHON_VERSION
        value: 3.10.0

  # 2. React Frontend Static Site
  - type: web
    name: support-crm-frontend
    env: static
    buildCommand: "npm run build"
    publishDir: build
    rootDir: crm-frontend
    envVars:
      - key: REACT_APP_API_URL
        value: https://support-crm-backend.onrender.com # Link to the backend service
